name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Queue concurrent deploys so a later push doesn't race with an earlier one
# resetting prod to an older SHA mid-deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Server first, client second — browsers loading new client get new server API.
  # Verified happy path in workflow_dispatch run 25713123618 before enabling
  # on push trigger.
  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy server (pull + ci + build + migrate? + restart + health, auto-rollback on fail)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          # TARGET_SHA passed as positional arg to remote bash to avoid
          # quote-fragile env-in-ssh-command-string interpolation.
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" bash -s "$TARGET_SHA" <<'REMOTE'
          set -euo pipefail
          TARGET_SHA="$1"

          cd /opt/erythos

          # Defensive: ensure .git is erythos-owned. Manual ssh debug
          # using sudo / root for git operations leaves root-owned
          # children under .git/refs and .git/logs, which then break
          # `sudo -u erythos git fetch` with "cannot lock ref … Permission
          # denied" on the next deploy. Cheap to run every time.
          sudo chown -R erythos:erythos .git

          PREV_SHA=$(sudo -u erythos git rev-parse HEAD)
          echo "[deploy-server] PREV=$PREV_SHA TARGET=$TARGET_SHA"

          # Log untracked files — reset --hard preserves them, but new
          # commits adding files at these paths would silently overwrite.
          UNTRACKED=$(sudo -u erythos git ls-files --others --exclude-standard || true)
          if [ -n "$UNTRACKED" ]; then
            echo "[deploy-server] untracked files (preserved across reset):"
            echo "$UNTRACKED" | sed 's/^/  /'
          fi

          sudo -u erythos git fetch origin
          sudo -u erythos git reset --hard "$TARGET_SHA"
          echo "[deploy-server] post-reset HEAD: $(sudo -u erythos git rev-parse HEAD)"

          sudo -u erythos npm ci
          sudo -u erythos npm run -w server build

          # Migration gated by server/migrations/** diff. `|| true` keeps
          # set -e + pipefail from tripping on empty grep / fetch oddities.
          MIG_DIFF=$(sudo -u erythos git diff --name-only "$PREV_SHA" "$TARGET_SHA" -- server/migrations/ || true)
          MIGRATE_FAILED=
          if [ -n "$MIG_DIFF" ]; then
            echo "[deploy-server] migration diff detected — running db:migrate"
            echo "$MIG_DIFF" | sed 's/^/  /'
            if ! sudo -u erythos npm run -w server db:migrate; then
              echo "[deploy-server] MIGRATION FAILED — service still running PREV; rollback git only" >&2
              MIGRATE_FAILED=1
            fi
          else
            echo "[deploy-server] no migration diff — skipping db:migrate"
          fi

          # If migration failed: revert git to PREV and fail loudly.
          # Do NOT restart the service — PREV binary is still running on PREV schema.
          # DB may be partially migrated; manual DBA review is required.
          if [ -n "${MIGRATE_FAILED:-}" ]; then
            echo "[deploy-server] aborting deploy — reverting git to $PREV_SHA" >&2
            sudo -u erythos git reset --hard "$PREV_SHA"
            echo "::error::Migration failed — git reverted to $PREV_SHA, service untouched. DB may be partially migrated; manual DBA review needed." >&2
            exit 1
          fi

          sudo systemctl restart erythos-server
          sleep 4

          # Health gate. `"status":"ok"` rejects degraded (db down still
          # returns 200 with status=degraded — gate rejects).
          HEALTH=$(curl -fsS http://localhost:3000/health || true)
          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "[deploy-server] health passed: $HEALTH"
            exit 0
          fi

          echo "[deploy-server] HEALTH FAILED: $HEALTH" >&2

          # ---------------------------------------------------------------
          # Auto-rollback to PREV_SHA. Note: only safe for additive
          # migrations (CREATE TABLE). Destructive migrations (DROP /
          # ALTER TYPE) leave new schema + old code on rollback → silent
          # breakage. Contract: destructive migrations must NOT go through
          # CI auto-deploy — manual deploy with explicit migration plan.
          #
          # We do NOT re-run db:migrate on rollback — drizzle migrations
          # are forward-only (no down() bodies). The additive-only contract
          # above is what makes PREV-code-on-TARGET-schema safe.
          # ---------------------------------------------------------------
          echo "[deploy-server] rolling back to $PREV_SHA..." >&2
          sudo -u erythos git reset --hard "$PREV_SHA"
          sudo -u erythos npm ci
          sudo -u erythos npm run -w server build
          sudo systemctl restart erythos-server
          sleep 4

          ROLL_HEALTH=$(curl -fsS http://localhost:3000/health || true)
          if echo "$ROLL_HEALTH" | grep -q '"status":"ok"'; then
            echo "[deploy-server] rollback succeeded — prod on $PREV_SHA" >&2
            exit 1   # still fail workflow so bad commit is visible
          fi

          echo "[deploy-server] ROLLBACK ALSO FAILED — MANUAL INTERVENTION" >&2
          echo "[deploy-server] last 60 lines of server journal:" >&2
          sudo journalctl -u erythos-server -n 60 --no-pager >&2 || true
          exit 2
          REMOTE

  deploy:
    needs: deploy-server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS (atomic symlink flip)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          RELEASE=$(date -u +%Y%m%d-%H%M%S)
          RELEASE_DIR="/opt/erythos/client/releases/$RELEASE"

          # Create release directory on VPS
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p $RELEASE_DIR"

          # Upload built files
          scp -i ~/.ssh/deploy_key -r dist/* "$VPS_USER@$VPS_HOST:$RELEASE_DIR/"

          # Atomic symlink flip: point current → new release
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "ln -snf $RELEASE_DIR /opt/erythos/client/current"

          # Prune old releases, keep latest 5
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "ls -1t /opt/erythos/client/releases/ | tail -n +6 | xargs -r -I{} rm -rf /opt/erythos/client/releases/{}"

          echo "Deployed release: $RELEASE"
          echo "Live at: /opt/erythos/client/current -> $RELEASE_DIR"

      - name: Sync server/deploy/ ops scripts
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key -r server/deploy/. \
            "$VPS_USER@$VPS_HOST:/opt/erythos/server/deploy/"
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "chmod +x /opt/erythos/server/deploy/*.sh"
          echo "Synced server/deploy/ scripts to /opt/erythos/server/deploy/"
