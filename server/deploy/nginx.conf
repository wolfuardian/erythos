# Erythos sync server — nginx reverse proxy
#
# 部署位置: /etc/nginx/sites-available/erythos.eoswolf.com
#           /etc/nginx/sites-enabled/erythos.eoswolf.com -> ../sites-available/...
#
# 預期狀態(certbot 已 issue cert):TLS 終止於 nginx,反向代理到 Node localhost:3000。
# 初次部署流程:見 install.md(certbot --standalone 先 issue cert,再啟用本檔)。

# ----------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name erythos.eoswolf.com;

    # ACME challenge 路徑(certbot --webroot 用;--standalone 模式不會走這)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------------
# HTTPS — reverse proxy to Hono server on :3000
# ----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erythos.eoswolf.com;

    # TLS — by certbot
    ssl_certificate     /etc/letsencrypt/live/erythos.eoswolf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erythos.eoswolf.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Request body 上限 1MB(對齊 spec line 194 / issue #897)
    # Hono 端也會 enforce;nginx 在更外層先擋
    client_max_body_size 1m;

    # 反向代理到 Node sync server
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 連線保持(Hono 不用 WebSocket,但留著無害)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 隱藏 nginx 版本
    server_tokens off;

    access_log /var/log/nginx/erythos.access.log;
    error_log  /var/log/nginx/erythos.error.log warn;
}
